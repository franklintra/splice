name: CLI builds

on: push

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: 'x86_64-linux-gnu'
            target: 'linux'
            os: 'ubuntu-22.04'
            native: false

          - triple: 'aarch64-linux-gnu'
            target: 'linux'
            os: 'ubuntu-22.04'
            native: false

          - triple: 'x86_64-windows-msvc'
            target: 'windows'
            os: 'ubuntu-22.04'
            native: false

          - triple: 'aarch64-windows-msvc'
            target: 'windows'
            os: 'ubuntu-22.04'
            native: false

          # macOS targets are built natively on macOS runners. Cross-linking
          # them from Linux with lld + an old SDK produces a Mach-O whose
          # __DATA_CONST segment lacks the SG_READ_ONLY flag, which the dyld on
          # recent macOS rejects at launch ("__DATA_CONST segment missing
          # SG_READ_ONLY flag"). See issue #103. Building with the system
          # toolchain (ld64) emits a correct, launchable binary.
          - triple: 'x86_64-apple-darwin'
            target: 'macos'
            os: 'macos-13'
            native: true

          - triple: 'arm64-apple-macos'
            target: 'macos'
            os: 'macos-14'
            native: true

    name: Build CLI for ${{ matrix.triple }}

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Update APT repos
        if: ${{ !matrix.native }}
        run: sudo apt-get update

      # Cross-compilation path (Linux and Windows targets, built from Ubuntu).
      - name: Set-up D compiler (cross)
        if: ${{ !matrix.native }}
        uses: ./.github/actions/setup-d-compiler
        with:
          target-triple: ${{ matrix.triple }}

      # Native path (macOS targets, built on macOS runners with the system
      # linker so the resulting binary launches on modern macOS).
      - name: Set-up D compiler (native)
        if: ${{ matrix.native }}
        uses: dlang-community/setup-dlang@v1
        with:
          compiler: ldc-1.41.0

      - name: Write version file
        uses: ./.github/actions/write-version-file

      - name: Build (cross)
        if: ${{ !matrix.native }}
        run: dub build -b release-debug --compiler=ldc2 --arch ${{ matrix.triple }} :cli-frontend

      - name: Build (native)
        if: ${{ matrix.native }}
        run: dub build -b release-debug --compiler=ldc2 :cli-frontend

      - name: Move files around for artifcation
        uses: ./.github/actions/rename-files
        with:
          build-tag: cli-${{ matrix.triple }}

      - uses: actions/upload-artifact@v4
        with:
          name: splice-cli-${{ matrix.triple }}
          path: |
            ${{github.workspace}}/bin/*

  # Combine the two native macOS slices into a single universal (fat) binary so
  # users get one download that runs on both Intel and Apple Silicon.
  macos-universal:
    name: Build macOS universal CLI
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: splice-cli-x86_64-apple-darwin
          path: x64

      - uses: actions/download-artifact@v4
        with:
          name: splice-cli-arm64-apple-macos
          path: arm64

      - name: Create universal binary with lipo
        run: |
          mkdir -p bin
          lipo -create -output bin/splice-cli-macos-universal \
            x64/splice-cli-x86_64-apple-darwin \
            arm64/splice-cli-arm64-apple-macos
          chmod +x bin/splice-cli-macos-universal
          lipo -info bin/splice-cli-macos-universal

      - uses: actions/upload-artifact@v4
        with:
          name: splice-cli-macos-universal
          path: ${{github.workspace}}/bin/splice-cli-macos-universal
