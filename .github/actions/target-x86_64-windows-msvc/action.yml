name: Set-up LDC to target Windows x86_64
description: Adds a working x86_64-windows-msvc target to LDC.

runs:
  using: composite
  steps:
    - name: Install Clang
      shell: bash
      run: sudo apt-get install -y clang lld 7zip

    - name: Set-up Windows cross-compilation
      shell: bash --noprofile --norc -e {0}
      run: |
        mkdir -p $HOME/.ldc/
        LDC_VERSION=$(ldc2 --version | head -n 1 | grep -oE "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*")
        cat << EOF | tee $HOME/.ldc/ldc2.conf
        "x86_64-.*-windows-msvc":
        {
            // default switches injected before all explicit command-line switches
            switches = [
                "-defaultlib=phobos2-ldc,druntime-ldc",
            ];
            // default switches appended after all explicit command-line switches
            post-switches = [
                "-I$HOME/ldc2-$LDC_VERSION-windows-x64/import",
            ];
            // default directories to be searched for libraries when linking
            lib-dirs = [
                "$HOME/ldc2-$LDC_VERSION-windows-x64/lib",
            ];
        };
        EOF
        curl -LO https://github.com/ldc-developers/ldc/releases/download/v$LDC_VERSION/ldc2-$LDC_VERSION-windows-x64.7z
        7z x ./ldc2-$LDC_VERSION-windows-x64.7z -o$HOME

        # lld-link is case-sensitive on Linux, but some D pragma(lib) directives
        # use a capitalized name (e.g. Bcrypt.lib, pulled in by phobos' RNG) while
        # the bundled MinGW import libs are all lowercase. Add capitalized-first
        # aliases so those default-lib references resolve when cross-linking.
        MINGW="$HOME/ldc2-$LDC_VERSION-windows-x64/lib/mingw"
        if [ -d "$MINGW" ]; then
            for f in "$MINGW"/*.lib; do
                b=$(basename "$f")
                cap="$(printf '%s' "${b%.lib}" | sed 's/^./\U&/').lib"
                if [ "$cap" != "$b" ] && [ ! -e "$MINGW/$cap" ]; then
                    ln -s "$b" "$MINGW/$cap"
                fi
            done
        fi
